name: Claude Auto-Implement

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    services:
      db:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: auto_trial_test
          MYSQL_USER: app
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: app
      DB_PASSWORD: password
      DB_NAME_TEST: auto_trial_test

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create feature branch
        id: branch
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y default-libmysqlclient-dev libvips

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Prepare test database
        run: bundle exec rails db:migrate

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Implement with Claude Code
        run: |
          claude --dangerously-skip-permissions \
            --allowedTools "Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write" \
            --print "$CLAUDE_PROMPT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_PROMPT: |
            以下のGitHub Issueの内容をコードで実装してください。

            ## Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ## 実装の手順

            1. 関連するファイルを Read ツールで読んで現状を把握する
            2. 問題を修正するコードを Edit/Write ツールで実際に書く（必ずファイルを変更すること）
            3. `bundle exec rspec` でテストを実行し、すべて通ることを確認する
            4. `bundle exec rubocop` でlintチェックし、エラーがあれば `bundle exec rubocop -a` で修正する

            ## 注意事項
            - db/schema.rb は変更しないでください（マイグレーションが必要な場合のみ db/migrate/ に追加）
            - コードの変更なしに完了としないでください。必ず app/ や spec/ 以下のファイルを編集すること
            - テストが存在しない場合は spec/ に追加してください

      - name: Commit changes
        id: commit
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat: ${{ github.event.issue.title }}

            Closes #${{ github.event.issue.number }}"
            git push -u origin "${{ steps.branch.outputs.name }}" --force-with-lease
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          {
            echo "## 関連 Issue"
            echo ""
            echo "Closes #${ISSUE_NUMBER}"
            echo ""
            echo "## 問題"
            echo ""
            echo "${ISSUE_BODY}"
            echo ""
            echo "## 原因"
            echo ""
            echo "（Claude が実装時に特定した根本原因をここに記載）"
            echo ""
            echo "## 対応内容"
            echo ""
            echo "（変更したファイル・実装方針の概要をここに記載）"
            echo ""
            echo "## レビューのポイント"
            echo ""
            echo "- ロジックの正確性"
            echo "- バリデーション・エラー処理の漏れ"
            echo "- テストカバレッジ"
          } > /tmp/pr_body.md
          PR_URL=$(gh pr create \
            --title "${ISSUE_TITLE}" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "${BRANCH_NAME}")
          gh issue comment "${ISSUE_NUMBER}" \
            --body "実装が完了しました。PRを作成しました: ${PR_URL}"
